  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { background: #0c0f14; color: #e8edf5; font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

  input:focus, select:focus, textarea:focus { outline: 2px solid #4d9ef7; outline-offset: 1px; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .fade-in { animation: fadeIn .25s ease both; }
  @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.5; } }
</style>
</head>
<body>
<div id="root"></div>

const { useState, useEffect, useCallback, useRef } = React;

// ── Paleta ─────────────────────────────────────────────────────────────────

  bg:"#0c0f14", surface:"#13181f", surface2:"#1a2130",
  border:"#1e2a3a", border2:"#253448",
  accent:"#4d9ef7", accent2:"#7b5ea7", accent3:"#ff6b4a", accent4:"#c77dff",
  green:"#34d399", yellow:"#fbbf24", red:"#f87171",
  text:"#e8edf5", muted:"#6b7b93", muted2:"#8fa3bf",

// ── Constantes ─────────────────────────────────────────────────────────────

  { value:"verde",    label:"Saudável", color:C.green,  emoji:"🟢" },
  { value:"amarelo",  label:"Atenção",  color:C.yellow, emoji:"🟡" },
  { value:"vermelho", label:"Em risco", color:C.red,    emoji:"🔴" },

const FASES  = ["Onboarding","Ongoing","Adoção","Expansão","Em risco","Renovação","Churned"];
const TIERS  = ["High-touch","Mid-touch","Low-touch","Tech-touch"];
const PERFIS = ["Analítico","Expressivo","Controlador","Apoiador","Misto"];
const CANAIS = ["E-mail","Reunião","WhatsApp","Slack","Telefone","Assíncrono"];
const TONS   = ["Formal","Informal","Técnico","Executivo"];
const PAPEIS = ["Decisor","Influenciador","Usuário","Sponsor","Detrator"];
const TIPOS_INTERACAO = ["Reunião","E-mail","WhatsApp","Ligação","Slack","QBR","Outro"];
const STORE  = "cs_portfolio_v2";

// ── Helpers ────────────────────────────────────────────────────────────────
const uid  = () => Math.random().toString(36).slice(2,9);
const save = (d) => { try { localStorage.setItem(STORE, JSON.stringify(d)); } catch {} };
const today = () => new Date().toISOString().slice(0,10);

const daysUntilRenewal = (dateStr) => {
  if (!dateStr) return null;
  const diff = new Date(dateStr).setHours(0,0,0,0) - new Date().setHours(0,0,0,0);
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
};

const renewalColor = (days) => {
  if (days === null) return null;
  if (days <= 30) return C.red;
  if (days <= 60) return C.yellow;
  if (days <= 90) return C.accent;
  return null;
};

const exportCSV = (clients) => {
  const headers = ['Nome','Empresa','Segmento','Tier','MRR','Renovação','Health','Fase','NPS','Última Interação','Próximos Passos','Expansão'];
  const rows = clients.map(c => [
    c.nome, c.empresa, c.segmento, c.tier, c.mrr, c.renovacao,
    HEALTH.find(h=>h.value===c.health)?.label||'',
    c.fase, c.nps, c.ultimaInteracao, c.proximosPassos, c.expansao
  ].map(v => `"${(v||'').toString().replace(/"/g,'""')}"`).join(','));
  const csv = [headers.join(','), ...rows].join('\n');
  const blob = new Blob(['\uFEFF'+csv], {type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'carteira_cs.csv'; a.click();
  URL.revokeObjectURL(url);
};

// ── Load inicial ───────────────────────────────────────────────────────────
const loadInitial = () => {
  try {
    const raw = localStorage.getItem(STORE);
    if (raw === null) return DEMO_CLIENTS;
    const parsed = JSON.parse(raw);
    if (!parsed || parsed.length === 0) return DEMO_CLIENTS;
    return parsed;
  } catch { return DEMO_CLIENTS; }
};

// ── Base styles ────────────────────────────────────────────────────────────
const inp = {
  width:"100%", background:C.surface2, border:`1px solid ${C.border2}`,
  borderRadius:8, color:C.text, fontSize:13.5, padding:"9px 12px", lineHeight:1.5,
};
const btn = (bg, color, extra={}) => ({
  padding:"9px 18px", background:bg, border:"none", borderRadius:8,
  color, fontWeight:600, fontSize:13, cursor:"pointer", ...extra,
});

// ── Primitives ─────────────────────────────────────────────────────────────
function Field({ label, hint, children }) {
  return (
    <div style={{marginBottom:16}}>
      <label style={{display:"block",fontSize:10.5,fontWeight:700,letterSpacing:".12em",
        textTransform:"uppercase",color:C.muted2,marginBottom:5}}>{label}</label>
      {hint && <p style={{fontSize:11,color:C.muted,marginBottom:5,lineHeight:1.45}}>{hint}</p>}
      {children}
    </div>
  );
}
const Input = ({value,onChange,placeholder,type="text"}) =>
  <input type={type} value={value} onChange={e=>onChange(e.target.value)}
    placeholder={placeholder} style={inp}/>;
const Textarea = ({value,onChange,placeholder,rows=3}) =>
  <textarea value={value} onChange={e=>onChange(e.target.value)}
    placeholder={placeholder} rows={rows} style={{...inp,resize:"vertical",lineHeight:1.6}}/>;

function Sel({value,onChange,opts}) {
  return (
    <select value={value} onChange={e=>onChange(e.target.value)} style={{...inp,cursor:"pointer"}}>
      <option value="">Selecionar…</option>
      {opts.map(o=><option key={o} value={o}>{o}</option>)}
    </select>
  );
}
function MultiSel({value=[],onChange,opts}) {
  const toggle = o => onChange(value.includes(o)?value.filter(x=>x!==o):[...value,o]);
  return (
    <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
      {opts.map(o=>(
        <button key={o} onClick={()=>toggle(o)} type="button"
          style={{padding:"5px 12px",borderRadius:99,fontSize:12,cursor:"pointer",
            border:`1px solid ${value.includes(o)?C.accent:C.border2}`,
            background:value.includes(o)?`${C.accent}18`:C.surface2,
            color:value.includes(o)?C.accent:C.muted2}}>
          {o}
        </button>
      ))}
    </div>
  );
}
function HealthPicker({value,onChange}) {
  return (
    <div style={{display:"flex",gap:8}}>
      {HEALTH.map(h=>(
        <button key={h.value} onClick={()=>onChange(h.value)} type="button"
          style={{flex:1,padding:"9px 4px",borderRadius:8,cursor:"pointer",
            border:`1px solid ${value===h.value?h.color:C.border2}`,
            background:value===h.value?`${h.color}18`:C.surface2,
            color:value===h.value?h.color:C.muted2,
            fontSize:12,fontWeight:700}}>
          {h.emoji} {h.label}
        </button>
      ))}
    </div>
  );
}
function Badge({label,color=C.accent}) {
  return (
    <span style={{display:"inline-block",padding:"2px 9px",borderRadius:99,
      fontSize:11,fontWeight:600,background:`${color}18`,
      color,border:`1px solid ${color}30`,whiteSpace:"nowrap"}}>
      {label}
    </span>
  );
}
function Dot({value,size=9}) {
  const h = HEALTH.find(x=>x.value===value)||HEALTH[0];
  return <span style={{display:"inline-block",width:size,height:size,borderRadius:"50%",
    background:h.color,boxShadow:`0 0 6px ${h.color}66`,flexShrink:0}}/>;
}
function Divider({icon,label,color=C.accent}) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:9,
      margin:"26px 0 16px",paddingBottom:10,borderBottom:`1px solid ${C.border}`}}>
      <span style={{fontSize:15}}>{icon}</span>
      <span style={{fontSize:10,fontWeight:700,letterSpacing:".14em",
        textTransform:"uppercase",color}}>{label}</span>
    </div>
  );
}

// ── Renewal Alert ──────────────────────────────────────────────────────────
function RenewalAlert({renovacao, inline=false}) {
  const days = daysUntilRenewal(renovacao);
  const color = renewalColor(days);
  if (!color) return null;
  const label = days <= 0 ? "Contrato vencido!" : days === 1 ? "Vence amanhã!" : `Renova em ${days}d`;
  if (inline) return <Badge label={`🔔 ${label}`} color={color}/>;
  return (
    <div style={{marginTop:8,padding:"6px 10px",borderRadius:7,
      background:`${color}15`,border:`1px solid ${color}40`,
      fontSize:11.5,color,fontWeight:600}}>
      🔔 {label}
    </div>
  );
}

// ── Stakeholder Editor ─────────────────────────────────────────────────────
function StkEditor({list,onChange}) {
  const add = () => onChange([...list,emptyStk()]);
  const rm  = id => onChange(list.filter(s=>s.id!==id));
  const upd = (id,k,v) => onChange(list.map(s=>s.id===id?{...s,[k]:v}:s));
  return (
    <div>
      {list.map(s=>(
        <div key={s.id} style={{background:C.surface2,border:`1px solid ${C.border}`,
          borderRadius:10,padding:14,marginBottom:10}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
            <input value={s.nome} onChange={e=>upd(s.id,"nome",e.target.value)}
              placeholder="Nome" style={{...inp,fontSize:12.5}}/>
            <input value={s.cargo} onChange={e=>upd(s.id,"cargo",e.target.value)}
              placeholder="Cargo" style={{...inp,fontSize:12.5}}/>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:8}}>
            <select value={s.papel} onChange={e=>upd(s.id,"papel",e.target.value)}
              style={{...inp,fontSize:12.5,cursor:"pointer"}}>
              {PAPEIS.map(p=><option key={p}>{p}</option>)}
            </select>
            <input value={s.email} onChange={e=>upd(s.id,"email",e.target.value)}
              placeholder="E-mail / contato" style={{...inp,fontSize:12.5}}/>
          </div>
          <div style={{display:"flex",gap:8}}>
            <input value={s.notas} onChange={e=>upd(s.id,"notas",e.target.value)}
              placeholder="Notas sobre essa pessoa…" style={{...inp,fontSize:12.5,flex:1}}/>
            <button onClick={()=>rm(s.id)} type="button"
              style={{padding:"0 12px",background:"rgba(248,113,113,.1)",
                border:"1px solid rgba(248,113,113,.25)",borderRadius:8,
                color:C.red,cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
          </div>
        </div>
      ))}
      <button onClick={add} type="button"
        style={{width:"100%",padding:9,background:"transparent",
          border:`1px dashed ${C.border2}`,borderRadius:8,
          color:C.muted2,cursor:"pointer",fontSize:13}}>
        + Adicionar stakeholder
      </button>
    </div>
  );
}

// ── Interaction Log Editor ─────────────────────────────────────────────────
function InteractionLogEditor({list=[],onChange}) {
  const add = () => onChange([emptyInteracao(),...list]);
  const rm  = id => onChange(list.filter(i=>i.id!==id));
  const upd = (id,k,v) => onChange(list.map(i=>i.id===id?{...i,[k]:v}:i));
  const sorted = [...list].sort((a,b)=>b.data.localeCompare(a.data));
  return (
    <div>
      {sorted.map(i=>(
        <div key={i.id} style={{background:C.surface2,border:`1px solid ${C.border}`,
          borderRadius:10,padding:14,marginBottom:10}}>
          <div style={{display:"grid",gridTemplateColumns:"148px 140px 1fr auto",gap:10,alignItems:"start"}}>
            <input type="date" value={i.data} onChange={e=>upd(i.id,"data",e.target.value)}
              style={{...inp,fontSize:12.5}}/>
            <select value={i.tipo} onChange={e=>upd(i.id,"tipo",e.target.value)}
              style={{...inp,fontSize:12.5,cursor:"pointer"}}>
              {TIPOS_INTERACAO.map(t=><option key={t}>{t}</option>)}
            </select>
            <input value={i.resumo} onChange={e=>upd(i.id,"resumo",e.target.value)}
              placeholder="Resumo da interação…" style={{...inp,fontSize:12.5}}/>
            <button onClick={()=>rm(i.id)} type="button"
              style={{padding:"0 12px",background:"rgba(248,113,113,.1)",
                border:"1px solid rgba(248,113,113,.25)",borderRadius:8,
                color:C.red,cursor:"pointer",fontSize:18,lineHeight:1,height:38}}>×</button>
          </div>
        </div>
      ))}
      <button onClick={add} type="button"
        style={{width:"100%",padding:9,background:"transparent",
          border:`1px dashed ${C.border2}`,borderRadius:8,
          color:C.muted2,cursor:"pointer",fontSize:13}}>
        + Registrar interação
      </button>
    </div>
  );
}

function G({label,hint,field}) {
  return <Field label={label} hint={hint}>{field}</Field>;
}

// ── FORM ───────────────────────────────────────────────────────────────────
function Form({initial,onSave,onCancel}) {
  const [c,setC] = useState(()=> initial
    ? {...emptyClient(), ...initial, interacoes: initial.interacoes||[] }
    : emptyClient());
  const s = k => v => setC(p=>({...p,[k]:v}));

  return (
    <div className="fade-in" style={{maxWidth:700,margin:"0 auto"}}>

      <Divider icon="🏢" label="Identificação" color={C.accent}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <G label="Nome / Razão Social" field={<Input value={c.nome} onChange={s("nome")} placeholder="Ana Silva / Empresa XYZ"/>}/>
        <G label="Empresa" field={<Input value={c.empresa} onChange={s("empresa")} placeholder="Nome da empresa"/>}/>
        <G label="Segmento / Indústria" field={<Input value={c.segmento} onChange={s("segmento")} placeholder="Ex: Fintech, Varejo, RH…"/>}/>
        <G label="Tier de Atendimento" field={<Sel value={c.tier} onChange={s("tier")} opts={TIERS}/>}/>
        <G label="MRR / ARR (R$)" field={<Input value={c.mrr} onChange={s("mrr")} placeholder="Ex: 2.500"/>}/>
        <G label="Renovação do Contrato" field={<Input value={c.renovacao} onChange={s("renovacao")} type="date"/>}/>
        <G label="Contato Principal" field={<Input value={c.contato} onChange={s("contato")} placeholder="email@empresa.com"/>}/>
        <G label="Fase do Ciclo de Vida" field={<Sel value={c.fase} onChange={s("fase")} opts={FASES}/>}/>
      </div>

      <Divider icon="🧠" label="Perfil Relacional" color={C.accent2}/>
      <G label="Perfil de Personalidade"
        hint="Como essa pessoa tende a se comportar? Orienta sua abordagem em reuniões e conversas."
        field={<Sel value={c.perfil} onChange={s("perfil")} opts={PERFIS}/>}/>
      <G label="Canal Preferido de Comunicação" field={<MultiSel value={c.canal} onChange={s("canal")} opts={CANAIS}/>}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
        <G label="Tom de Comunicação" field={<Sel value={c.tom} onChange={s("tom")} opts={TONS}/>}/>
        <G label="Frequência Ideal de Contato" hint="Semanal, quinzenal, mensal…"

      <InteractionLogEditor list={c.interacoes} onChange={s("interacoes")}/>

      <Divider icon="📝" label="Notas Gerais" color={C.muted2}/>
      <G label="Observações livres" field={<Textarea value={c.notas} onChange={s("notas")} rows={4}
          placeholder="Qualquer informação relevante que não se encaixou nos campos acima…"/>}/>

      <div style={{display:"flex",gap:10,marginTop:28,paddingTop:20,borderTop:`1px solid ${C.border}`}}>
        <button onClick={()=>onSave(c)}

          style={{...btn(C.surface2,C.muted2),border:`1px solid ${C.border}`,padding:"11px 20px"}}>
          Cancelar
        </button>
      </div>

  );
}

function Card({client,onClick}) {
  const [hov,setHov] = useState(false);
  const h = HEALTH.find(x=>x.value===client.health)||HEALTH[0];
  const rColor = renewalColor(daysUntilRenewal(client.renovacao));
  return (
    <div onClick={onClick}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{background:C.surface,borderRadius:12,padding:"18px 20px",cursor:"pointer",
        transition:"transform .15s, border-color .2s",
        border:`1px solid ${hov?h.color:C.border}`,
        borderLeft:`3px solid ${h.color}`,
        transform:hov?"translateY(-2px)":"none"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
            <Dot value={client.health}/>
            <span style={{fontWeight:700,fontSize:14.5,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              {client.nome||"Sem nome"}
            </span>
          </div>
          {client.empresa && <p style={{fontSize:12,color:C.muted,marginBottom:8}}>{client.empresa}</p>}
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {client.tier && <Badge label={client.tier} color={C.accent}/>}
            {client.fase && <Badge label={client.fase} color={C.accent2}/>}
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0,marginLeft:12}}>
          {client.mrr && <div style={{fontSize:13,fontWeight:700}}>R$ {client.mrr}</div>}
          {client.renovacao && <div style={{fontSize:11,color:C.muted,marginTop:3}}>↻ {client.renovacao}</div>}
        </div>
      </div>
      {rColor
        ? <RenewalAlert renovacao={client.renovacao}/>
        : client.proximosPassos && (
            <p style={{fontSize:11.5,color:C.muted,marginTop:10,paddingTop:10,
              borderTop:`1px solid ${C.border}`,lineHeight:1.5,
              whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
              🎯 {client.proximosPassos}
            </p>
          )
      }
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────────────────
function App() {
  const [clients, setClients] = useState(loadInitial);
  const [view,    setView]    = useState("list");
  const [sel,     setSel]     = useState(null);
  const [editing, setEditing] = useState(null);
  const [search,  setSearch]  = useState("");
  const [fHealth, setFHealth] = useState("");
  const [fFase,   setFFase]   = useState("");
  const [sortBy,  setSortBy]  = useState("criadoEm");

  const persist = list => { setClients(list); save(list); };

  const handleSave = c => {
    const lastInteraction = c.interacoes?.length > 0
      ? [...c.interacoes].sort((a,b)=>b.data.localeCompare(a.data))[0].data
      : c.ultimaInteracao || "";
    const updated = {...c, ultimaInteracao: lastInteraction};
    const exists = clients.find(x=>x.id===updated.id);
    const next = exists ? clients.map(x=>x.id===updated.id?updated:x) : [...clients,updated];
    persist(next);
    setSel(c);
    setView("detail");
  };

  const handleDelete = id => {
    if (!confirm("Remover esse cliente da carteira?")) return;
    persist(clients.filter(c=>c.id!==id));
    setView("list"); setSel(null);
  };

  const filtered = clients.filter(c=>{
    const q = search.toLowerCase();
    return (!q || [c.nome,c.empresa,c.segmento].some(f=>f?.toLowerCase().includes(q)))
      && (!fHealth || c.health===fHealth)
      && (!fFase   || c.fase===fFase);
  });

  const sortedClients = [...filtered].sort((a,b)=>{
    if (sortBy==="mrr")       return (parseFloat(b.mrr)||0)-(parseFloat(a.mrr)||0);
    if (sortBy==="renovacao")  return (a.renovacao||"9999").localeCompare(b.renovacao||"9999");
    if (sortBy==="health") {
      const order={vermelho:0,amarelo:1,verde:2};
      return (order[a.health]||0)-(order[b.health]||0);
    }
    return (b.criadoEm||"").localeCompare(a.criadoEm||"");
  });

  const stats = {
    total:    clients.length,
    verde:    clients.filter(c=>c.health==="verde").length,
    amarelo:  clients.filter(c=>c.health==="amarelo").length,
    vermelho: clients.filter(c=>c.health==="vermelho").length,
  };

  const alertCount = clients.filter(c=>renewalColor(daysUntilRenewal(c.renovacao))).length;

  const goBack = () => {
    if (view==="form" && sel) { setView("detail"); setEditing(null); }
    else { setView("list"); setSel(null); setEditing(null); }
  };

  const currentClient = sel ? clients.find(c=>c.id===sel.id)||sel : null;

  return (
    <div style={{minHeight:"100vh",background:C.bg,color:C.text}}>

      {/* TOPBAR */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,
        padding:"13px 24px",display:"flex",alignItems:"center",
        justifyContent:"space-between",gap:12,flexWrap:"wrap",
        position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          {view!=="list" && (
            <button onClick={goBack}
              style={{...btn(C.surface2,C.muted2),border:`1px solid ${C.border}`,
                padding:"7px 14px",fontSize:12.5}}>
              ← Voltar
            </button>
          )}
          <div>
            <span style={{fontWeight:700,fontSize:16.5,letterSpacing:"-.02em"}}>📂 CS Portfolio</span>
            <span style={{fontSize:12,color:C.muted,marginLeft:8}}>
              {clients.length} cliente{clients.length!==1?"s":""}
            </span>
            {alertCount > 0 && (
              <span style={{marginLeft:8,fontSize:11,fontWeight:700,
                background:`${C.red}18`,color:C.red,
                border:`1px solid ${C.red}40`,borderRadius:99,padding:"2px 8px"}}>
                🔔 {alertCount} renovação{alertCount>1?"ões":""} próxima{alertCount>1?"s":""}
              </span>
            )}
          </div>
        </div>

        {view==="list" && (
          <div style={{display:"flex",gap:8}}>
            {clients.length > 0 && (
              <button onClick={()=>exportCSV(clients)}
                style={{...btn(C.surface2,C.muted2),border:`1px solid ${C.border}`,padding:"9px 16px"}}>
                ↓ Exportar CSV
              </button>
            )}
            <button onClick={()=>{setEditing(null);setView("form");}}
              style={{...btn(C.accent,"#000"),padding:"9px 20px"}}>
              + Novo Cliente
            </button>
          </div>
        )}

        {view==="detail" && currentClient && (
          <div style={{display:"flex",gap:8}}>
            <button onClick={()=>{setEditing(currentClient);setView("form");}}
              style={{...btn(C.accent,"#000"),padding:"8px 16px"}}>✎ Editar</button>
            <button onClick={()=>handleDelete(currentClient.id)}
              style={{...btn("rgba(248,113,113,.1)",C.red),
                border:"1px solid rgba(248,113,113,.3)",padding:"8px 14px"}}>🗑</button>
          </div>
        )}
      </div>

      {/* BODY */}
      <div style={{padding:"26px 24px 60px",maxWidth:980,margin:"0 auto"}}>

        {/* LIST */}
        {view==="list" && (
          <div className="fade-in">
            {clients.length > 0 && (
              <>
                {/* Stats */}
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:22}}>
                  {[
                    {l:"Total",       v:stats.total,    c:C.accent},
                    {l:"🟢 Saudável", v:stats.verde,    c:C.green},
                    {l:"🟡 Atenção",  v:stats.amarelo,  c:C.yellow},
                    {l:"🔴 Em risco", v:stats.vermelho, c:C.red},
                  ].map(s=>(
                    <div key={s.l} style={{background:C.surface,border:`1px solid ${C.border}`,
                      borderRadius:10,padding:"13px 16px"}}>
                      <div style={{fontSize:10,color:C.muted,fontWeight:700,
                        textTransform:"uppercase",letterSpacing:".1em",marginBottom:5}}>{s.l}</div>
                      <div style={{fontSize:26,fontWeight:700,color:s.c}}>{s.v}</div>
                    </div>
                  ))}
                </div>

                {/* Filters + Sort */}
                <div style={{display:"flex",gap:10,marginBottom:18,flexWrap:"wrap"}}>
                  <input value={search} onChange={e=>setSearch(e.target.value)}
                    placeholder="🔍  Buscar cliente, empresa ou segmento…"
                    style={{...inp,flex:1,minWidth:180}}/>
                  <select value={fHealth} onChange={e=>setFHealth(e.target.value)}
                    style={{...inp,width:"auto",cursor:"pointer"}}>
                    <option value="">Todos os health</option>
                    {HEALTH.map(h=><option key={h.value} value={h.value}>{h.emoji} {h.label}</option>)}
                  </select>
                  <select value={fFase} onChange={e=>setFFase(e.target.value)}
                    style={{...inp,width:"auto",cursor:"pointer"}}>
                    <option value="">Todas as fases</option>
                    {FASES.map(f=><option key={f} value={f}>{f}</option>)}
                  </select>
                  <select value={sortBy} onChange={e=>setSortBy(e.target.value)}
                    style={{...inp,width:"auto",cursor:"pointer"}}>
                    <option value="criadoEm">Ordenar: Mais recentes</option>
                    <option value="mrr">Ordenar: Maior MRR</option>
                    <option value="renovacao">Ordenar: Renovação próxima</option>
                    <option value="health">Ordenar: Maior risco</option>
                  </select>
                </div>
              </>
            )}

            {clients.length===0 ? (
              <div style={{textAlign:"center",padding:"80px 20px"}}>
                <div style={{fontSize:52,marginBottom:16}}>📂</div>
                <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>Sua carteira está vazia</h2>
                <p style={{color:C.muted2,marginBottom:24,lineHeight:1.7}}>
                  Adicione seu primeiro cliente para começar a mapear<br/>
                  perfis, histórico e oportunidades.
                </p>
                <button onClick={()=>setView("form")}
                  style={{...btn(C.accent,"#000"),padding:"11px 28px",fontSize:14}}>
                  + Adicionar Primeiro Cliente
                </button>
              </div>
            ) : sortedClients.length===0 ? (
              <div style={{textAlign:"center",padding:"60px 20px",color:C.muted}}>
                Nenhum cliente encontrado com os filtros selecionados.
              </div>
            ) : (
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(290px,1fr))",gap:13}}>
                {sortedClients.map(c=>(
                  <Card key={c.id} client={c} onClick={()=>{setSel(c);setView("detail");}}/>
                ))}
              </div>
            )}
          </div>
        )}

        {/* FORM */}
        {view==="form" && (
          <Form initial={editing} onSave={handleSave} onCancel={goBack}/>
        )}

        {/* DETAIL */}
        {view==="detail" && currentClient && (
          <Detail
            client={currentClient}
            onEdit={()=>{setEditing(currentClient);setView("form");}}
            onDelete={()=>handleDelete(currentClient.id)}
          />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
